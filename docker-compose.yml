services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # user 1000:1000 で実行（Dockerfile の appuser に合わせる）。
    # ホスト側の ./backend/data, ./uploads は事前に
    # `sudo chown -R 1000:1000 ./backend/data ./uploads` で
    # 所有権を合わせること（詳細は docs/setup.md 参照）。
    user: "1000:1000"
    ports:
      - "8010:8000"
    volumes:
      - ./backend/data:/app/data
      - ./uploads:/app/uploads
      - /mnt:/host_drives:ro
    # .env から AWS_SESSION_TOKEN / ENVIRONMENT / API_KEYS 等を読み込む。
    # 以下の environment: 列は明示変数とデフォルト値の上書き用途。
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-1}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - API_KEYS=${API_KEYS:-}
      - BEDROCK_EMBED_MODEL_ID=${BEDROCK_EMBED_MODEL_ID:-cohere.embed-multilingual-v3}
      - BEDROCK_RERANK_MODEL_ID=${BEDROCK_RERANK_MODEL_ID:-cohere.rerank-v3-5:0}
      - NO_PROXY=localhost,127.0.0.1,::1,qdrant,backend,frontend
      - no_proxy=localhost,127.0.0.1,::1,qdrant,backend,frontend
      - BEDROCK_REGION=${BEDROCK_REGION:-ap-northeast-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-apac.anthropic.claude-sonnet-4-20250514-v1:0}
      - ORACLE_DSN=${ORACLE_DSN:-}
      - ORACLE_USER=${ORACLE_USER:-}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      - ORACLE_ENABLED=${ORACLE_ENABLED:-true}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SQLITE_DB_PATH=/app/data/ragphantom.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - UPLOAD_DIR=/app/uploads
      - MASTER_MD_PATH=/app/data/master-flat-with-place-aliases.md
      - GITEA_BASE_URL=${GITEA_BASE_URL:-}
      - GITEA_TOKEN=${GITEA_TOKEN:-}
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  qdrant_data:
