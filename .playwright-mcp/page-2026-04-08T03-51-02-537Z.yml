      - text: の
      - code [ref=e23]: backend > environment
      - text: "に追加:"
    - generic [ref=e24]:
      - text: yaml
      - code [ref=e25]: "backend: environment: # ... 既存の設定 ... - API_KEYS=[\"your-secure-api-key-here\"]"
