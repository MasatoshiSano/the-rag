            - generic [ref=e188]: アシスタント
            - generic [ref=e189]:
              - generic [ref=e190]: Oracleリスナーの接続確認で使用するコマンドについて、ナレッジベースの情報に基づいて詳しく説明いたします。
              - heading "Oracleリスナー接続確認の基本的な流れ" [level=4] [ref=e192]
              - heading "1. リスナー状態確認（lsnrctl）" [level=5] [ref=e194]
              - strong [ref=e197]: 基本コマンド：
              - generic [ref=e198]:
                - generic [ref=e199]: bash
                - code [ref=e200]: lsnrctl status
              - generic [ref=e202]: このコマンドは、リスナーの動作状況とサービス一覧を表示します。対象のデータベースサービスが登録されているかを確認できます。サービス一覧に対象DBが表示されない場合、ORA-12514エラーの原因となります。
              - strong [ref=e205]: その他のlsnrctlコマンド：
              - generic [ref=e206]:
                - generic [ref=e207]: bash
                - code [ref=e208]: "# リスナーの再読み込み（設定反映） lsnrctl reload # リスナーの停止と開始 lsnrctl stop lsnrctl start"
              - heading "2. データベース接続確認（SQL*Plus）" [level=5] [ref=e210]
              - strong [ref=e213]: 基本接続コマンド：
              - generic [ref=e214]:
                - generic [ref=e215]: sql
                - code [ref=e216]: sqlplus / as sysdba
              - generic [ref=e218]: このコマンドでSYSDBA権限でデータベースに接続し、インスタンスの状態を確認できます。
              - strong [ref=e221]: データベース状態確認：
              - generic [ref=e222]:
                - generic [ref=e223]: sql
                - code [ref=e224]: "-- インスタンス状態の確認 select status from v$instance; -- メモリ設定の確認 show parameter pga; show parameter sga; -- リスナーへの即時再登録 alter system register;"
              - heading "3. 接続トラブル調査の判定フロー" [level=5] [ref=e226]
              - generic [ref=e228]: ドキュメントに記載されている調査手順は以下の通りです：
              - list [ref=e230]:
                - listitem [ref=e231]:
                  - strong [ref=e232]: リスナー状況確認
                  - text: ":"
                  - code [ref=e233]: lsnrctl status
                  - text: でサービス一覧に対象DBがあるか確認
                - listitem [ref=e234]:
                  - strong [ref=e235]: DB状態確認
                  - text: ":"
                  - code [ref=e236]: sqlplus / as sysdba
                  - text: でインスタンスが
                  - code [ref=e237]: OPEN
                  - text: 状態か確認
                - listitem [ref=e238]:
                  - strong [ref=e239]: AWR確認
                  - text: ": 該当時間の統計データの有無を確認"
                - listitem [ref=e240]:
                  - strong [ref=e241]: alert log 確認
                  - text: ": Fatal / TNS-12535 / out of memory 等のキーワードを検索"
              - heading "4. 主要なエラーコードと対処法" [level=5] [ref=e243]
              - table [ref=e245]:
                - rowgroup [ref=e246]:
                  - row "エラーコード 意味・対処の方向性" [ref=e247]:
                    - columnheader "エラーコード" [ref=e248]
