                    - cell "ORA-12514" [ref=e252]:
                      - strong [ref=e253]: ORA-12514
                    - cell "リスナーにサービス名が登録されていない。DB停止や登録失敗を疑う" [ref=e254]
                  - row "ORA-12170 / TNS-12535 ネットワークタイムアウト。短時間の新規接続急増の可能性" [ref=e255]:
                    - cell "ORA-12170 / TNS-12535" [ref=e256]:
                      - strong [ref=e257]: ORA-12170 / TNS-12535
                    - cell "ネットワークタイムアウト。短時間の新規接続急増の可能性" [ref=e258]
                  - row "ORA-3136 サーバが接続を受け付けられずタイムアウト（サーバ過負荷等）" [ref=e259]:
                    - cell "ORA-3136" [ref=e260]:
                      - strong [ref=e261]: ORA-3136
                    - cell "サーバが接続を受け付けられずタイムアウト（サーバ過負荷等）" [ref=e262]
              - heading "5. システムレベルでの確認コマンド" [level=5] [ref=e264]
              - strong [ref=e267]: Windows環境での確認：
              - generic [ref=e268]:
                - generic [ref=e269]: powershell
                - code [ref=e270]: "# 物理メモリ確認 systeminfo | findstr /C:\"Total Physical Memory\" # プロセスのメモリ使用量確認 Get-Process oracle | Select-Object ProcessName, Id, @{N=\"PrivateMB\";E={$_.PrivateMemorySize64/1MB}} # TCP接続状況の確認 Get-NetTCPConnection | Sort-Object State"
              - heading "6. 応急対処のためのメモリ制限設定" [level=5] [ref=e272]
              - generic [ref=e274]:
                - generic [ref=e275]: sql
                - code [ref=e276]: "-- 応急的なメモリ制限設定 ALTER SYSTEM SET pga_aggregate_limit = 8G SCOPE=BOTH; ALTER SYSTEM SET pga_aggregate_target = 4G SCOPE=BOTH;"
              - heading "まとめ" [level=4] [ref=e278]
              - generic [ref=e280]:
                - text: Oracleリスナーの接続確認は、まず
                - code [ref=e281]: lsnrctl status
